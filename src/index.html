<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>ZenWidget</title>
  <script>
    (() => {
      const h = document.documentElement;
      if (window.__TAURI__) {
        h.classList.add('tauri');
        const ua = navigator.userAgent;
        if (ua.includes('Mac'))     h.classList.add('macos');
        else if (ua.includes('Win')) h.classList.add('windows');
      } else if (window.Capacitor) {
        h.classList.add('capacitor');
        h.classList.add(window.Capacitor.getPlatform()); // 'ios' | 'android'
      }
    })();
  </script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="widget">
    <div id="widget-header">
      <span id="game-label">ZenWidget</span>
      <div id="header-controls">
        <button id="btn-mute"     title="Звук">🔊</button>
        <button id="btn-picker"   title="Выбрать игру">⊞</button>
        <button id="btn-minimize" title="Свернуть">–</button>
        <button id="btn-close"    title="Закрыть">×</button>
      </div>
    </div>
    <div id="widget-body">
      <canvas id="game-canvas"></canvas>
      <!-- #game-picker добавляется динамически через widgetShell -->
    </div>
  </div>

  <script type="module">
    import { GameManager }   from './core/gameManager.js';
    import { WidgetShell }   from './core/widgetShell.js';

    // Существующие игры
    import bubblesGame      from './games/bubbles/index.js';
    import cloudsGame       from './games/clouds/index.js';
    import sandGame         from './games/sand/index.js';
    import zenGardenGame    from './games/zenGarden/index.js';
    import waterRippleGame  from './games/waterRipple/index.js';

    // Новые игры
    import firefliesGame      from './games/fireflies/index.js';

    import campfireGame       from './games/campfire/index.js';
    import holoPaperGame      from './games/holoPaper/index.js';
    import newtonCradleGame   from './games/newtonCradle/index.js';
    import metronomeGame      from './games/metronome/index.js';

    import pendulumGame        from './games/pendulum/index.js';
    import lavaLampGame       from './games/lavaLamp/index.js';
    import auroraGame         from './games/aurora/index.js';
    import inkGame            from './games/ink/index.js';
    import aquariumGame       from './games/aquarium/index.js';
    import leavesGame         from './games/leaves/index.js';
    import snowGlobeGame      from './games/snowGlobe/index.js';
    import tetrisGame         from './games/tetris/index.js';
    import snakeGame          from './games/snake/index.js';
    import generatorGame      from './games/generator/index.js';

    const canvas  = document.getElementById('game-canvas');
    const manager = new GameManager(canvas);

    manager.register(bubblesGame);
    manager.register(cloudsGame);
    manager.register(sandGame);
    manager.register(zenGardenGame);
    manager.register(waterRippleGame);
    manager.register(firefliesGame);

    manager.register(pendulumGame);
    manager.register(campfireGame);
    manager.register(holoPaperGame);
    manager.register(newtonCradleGame);
    manager.register(metronomeGame);

    manager.register(lavaLampGame);
    manager.register(auroraGame);
    manager.register(inkGame);
    manager.register(aquariumGame);
    manager.register(leavesGame);
    manager.register(snowGlobeGame);
    manager.register(tetrisGame);
    manager.register(snakeGame);
    manager.register(generatorGame);

    const shell = new WidgetShell(
      document.getElementById('widget'),
      document.getElementById('widget-header'),
      manager
    );

    shell.init();
    shell.startWith('bubbles');
  </script>
</body>
</html>
